name: Build Pixel Props Module

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      devices:
        description: >
          Comma-separated device targets.
          Format: <codename> (stable) | <codename>_beta<ver> (beta) | <codename>_beta<ver>qpr<n> (QPR beta)
          Example: husky,shiba,husky_beta17q1,caiman_beta17q1
          Leave empty to use the default scheduled device list.
        required: false
        type: string

  schedule:
    # Run on the 7th of every month at 13:37 UTC
    - cron: '37 13 7 * *'

permissions:
  contents: write

# ---------------------------------------------------------------------------
# Job 1 — Resolve targets & create the shared release
# ---------------------------------------------------------------------------
jobs:
  prepare:
    name: Prepare — resolve targets & create release
    runs-on: ubuntu-latest
    outputs:
      tag_name:    ${{ steps.meta.outputs.tag_name }}
      build_date:  ${{ steps.meta.outputs.build_date }}
      matrix:      ${{ steps.meta.outputs.matrix }}

    steps:
      - name: Resolve targets & build metadata
        id: meta
        run: |
          if [[ -n "${{ github.event.inputs.devices }}" ]]; then
            DEVICES="${{ github.event.inputs.devices }}"
          else
            # Default scheduled device list — update when a new beta drops
            DEVICES="rango_beta17q1,mustang_beta17q1,blazer_beta17q1,frankel_beta17q1,tegu_beta17q1,comet_beta17q1,komodo_beta17q1,caiman_beta17q1,tokay_beta17q1,akita_beta17q1,husky_beta17q1,shiba_beta17q1,tangorpro_beta17q1,felix_beta17q1"
          fi

          BUILD_DATE=$(date -u '+%Y-%m-%d')
          TAG_NAME=$(date -u '+%Y%m%d')

          # Convert comma-separated device list to JSON array for matrix
          MATRIX=$(python3 -c "import json,sys; d='${DEVICES}'; print(json.dumps(d.split(',')))")

          echo "tag_name=${TAG_NAME}"   >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"
          echo "matrix=${MATRIX}"       >> "$GITHUB_OUTPUT"
          echo "Resolved targets: ${DEVICES}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag_name }}
          name:       "Pixel Props — ${{ steps.meta.outputs.build_date }}"
          body: |
            ## Pixel Props Module Build

            **Date:** ${{ steps.meta.outputs.build_date }}
            **Triggered by:** ${{ github.event_name == 'schedule' && 'Scheduled run' || github.actor }}

            ### Installation
            1. Download the `.zip` file for your device.
            2. Flash via **Magisk**, **KernelSU**, or **APatch**.
            3. Reboot and verify attestation with [Play Integrity API Checker](https://play.google.com/store/apps/details?id=gr.nikolasspyr.integritycheck).

            ### Support
            - Telegram: [t.me/PixelProps](https://t.me/PixelProps)
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ---------------------------------------------------------------------------
# Job 2 — Build one device per matrix slot (runs in parallel)
# ---------------------------------------------------------------------------
  build:
    name: Build — ${{ matrix.device_name }}
    needs: prepare
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        device_name: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # -----------------------------------------------------------------------
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            aria2 \
            p7zip-full \
            zip \
            dos2unix \
            unzip

      # -----------------------------------------------------------------------
      - name: Set up Python venv & install payload_dumper
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          pip install --quiet ./payload_dumper/

      # -----------------------------------------------------------------------
      - name: Make scripts executable
        run: chmod +x ./*.sh

      # -----------------------------------------------------------------------
      - name: Download OTA payload for ${{ matrix.device_name }}
        run: bash download_ota.sh "${{ matrix.device_name }}"

      # -----------------------------------------------------------------------
      - name: Extract images and build module
        id: build
        run: bash extract_images.sh

      # -----------------------------------------------------------------------
      - name: Check if build already exists in any release
        id: check_build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASENAME="${{ steps.build.outputs.module_base_name }}"
          echo "Checking if '${BASENAME}' already exists in any release..."

          BUILD_EXISTS=false
          RELEASES=$(gh release list --limit 100 --json tagName -q '.[].tagName' 2>/dev/null || true)

          for TAG in $RELEASES; do
            [[ "$TAG" == "${{ needs.prepare.outputs.tag_name }}" ]] && continue
            RELEASE_BODY=$(gh release view "$TAG" --json body -q '.body' 2>/dev/null || true)
            if [[ "$RELEASE_BODY" == *"${BASENAME}"* ]]; then
              echo "Found '${BASENAME}' in release ${TAG} — skipping upload."
              BUILD_EXISTS=true
              break
            fi
          done

          echo "BUILD_EXISTS=${BUILD_EXISTS}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      - name: Upload module zip to release
        if: steps.check_build.outputs.BUILD_EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.prepare.outputs.tag_name }}" \
            "./${{ steps.build.outputs.module_base_name }}.zip" \
            --repo "${{ github.repository }}" \
            --clobber

      # -----------------------------------------------------------------------
      - name: Append build info to release notes
        if: steps.check_build.outputs.BUILD_EXISTS == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CURRENT_BODY=$(gh release view "${{ needs.prepare.outputs.tag_name }}" \
            --json body -q '.body' --repo "${{ github.repository }}" 2>/dev/null || true)

          APPEND="

          ---
          ## ${{ steps.build.outputs.device_name }} (${{ steps.build.outputs.device_codename }})
          #### Module
          - File name: \`${{ steps.build.outputs.module_base_name }}.zip\`
          - SHA256: \`${{ steps.build.outputs.module_hash }}\`
          #### Firmware
          - Build: \`${{ steps.build.outputs.device_build_description }}\`"

          gh release edit "${{ needs.prepare.outputs.tag_name }}" \
            --notes "${CURRENT_BODY}${APPEND}" \
            --repo "${{ github.repository }}"

